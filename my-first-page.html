<!DOCTYPE html>
<!-- This means that the document is an html5 document. It is the standard declaration for HTML5 and helps browsers understand how to interpret the content of the page. -->
<html lang="en">
<!-- This tag means that the page is in English language and also everything in the page is wrapped inside html tag -->
    <head>
        <!-- This tag contains info about the webpage that is not displayed on the page itself -->
        <meta charset="UTF-8">
        <!-- This tag tells the browser which character encoding system the webpage uses. Encoding means converting data or info into a specific format that is easily read and understood by different systems -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- This tag tells the browser how to display the webpage on different screen sizes like phones and tablets -->
        <meta name="description" content="A website for learning html.">
        <!-- This tag tells a short description of the page -->
        <meta name="author" content="Blaise Rudasingwa">
        <!-- This tag specifies who created the webpage -->
        <meta property="og:title" content="My First Webpage">
        <!-- This tag helps your title to display in social media preview. og(open graph) -->
        <meta property="og:description" content="A website for learning HTML">
        <!-- This tag gives a short description of the page below the title -->
        <meta property="og:image" content="https://example.com/image.jpg">
        <!-- This tag shows an image about your page in social media preview -->
        <title>My First Website</title>
        <!-- This tag reveals the title of the website in the browser's tab -->   
    </head>
    <body>
    <!-- This tag contains everything that is displayed on the webpage -->
     <h1>Welcome to My Website</h1>
     <p>This is my first webpage</p>    
    </body>
    
</html>
